name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Only the deps the CPU test suite needs — deliberately NOT the heavy model
      # stack (diffusers/transformers/datasets). Those run on the 4090 box.
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy safetensors pytest ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q
